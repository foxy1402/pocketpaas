name: Build & Push Docker Image

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  build:
    name: Build multi-arch image → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets Buildx run arm64 user-space code for the final stage copy
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces: :latest (on default branch) + :sha-<short-sha>
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass build args so the Go toolchain targets the right OS/arch
          build-args: |
            BUILDTIME=${{ github.event.head_commit.timestamp }}
            REVISION=${{ github.sha }}
